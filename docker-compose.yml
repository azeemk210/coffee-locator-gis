services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gis-portal-backend
    # ports: - "8000:8000"  # You can comment this out; Nginx handles it now!
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SECRET_KEY=${SECRET_KEY}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - PYTHONUNBUFFERED=1
    volumes:
      - ./backend:/app
      - /app/.venv
    networks:
      - gis-network
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/\")' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      - db
    command: uvicorn main:app --host 0.0.0.0 --port 8000

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Use the Server IP so the browser knows where to go
        - NEXT_PUBLIC_API_URL=http://192.168.120.65/api
    container_name: gis-portal-frontend
    # ports: - "3000:3000" # You can comment this out; Nginx handles it now!
    environment:
      - NODE_ENV=production
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    networks:
      - gis-network
    depends_on:
      backend:
        condition: service_healthy
    command: npm run start

  db:
    image: postgis/postgis:17-3.4
    container_name: gis-portal-db
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}
      - POSTGRES_DB=${POSTGRES_DB:-gis_portal}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - gis-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    
  nginx:
    image: nginx:alpine
    container_name: gis-portal-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - gis-network
    depends_on:
      - frontend
      - backend

networks:
  gis-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local