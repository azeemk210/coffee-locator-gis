version: '3.8'

services:
  # Backend service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gis-portal-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SECRET_KEY=${SECRET_KEY}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - PYTHONUNBUFFERED=1
    volumes:
      # Mount source code for development hot-reload
      - ./backend:/app
      # Exclude virtual environment
      - /app/.venv
    networks:
      - gis-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    depends_on:
      - db
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # Frontend service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gis-portal-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://backend:8000}
      - NODE_ENV=${NODE_ENV:-development}
    volumes:
      # Mount source code for development hot-reload
      - ./frontend:/app
      # Exclude node_modules to avoid conflicts
      - /app/node_modules
      - /app/.next
    networks:
      - gis-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    depends_on:
      backend:
        condition: service_healthy
    command: npm run dev

  # Optional: PostgreSQL database service (for local development)
  db:
    image: postgis/postgis:17-3.4
    container_name: gis-portal-db
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}
      - POSTGRES_DB=${POSTGRES_DB:-gis_portal}
    ports:
      - "5432:5432"
    volumes:
      # Persist database data
      - postgres_data:/var/lib/postgresql/data
    networks:
      - gis-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Uncomment to use local database instead of Supabase
    # profiles:
    #   - local-db

networks:
  gis-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
