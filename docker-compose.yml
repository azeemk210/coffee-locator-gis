
services:
  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: gis-portal-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - gis-network
    depends_on:
      - frontend
      - backend

  # Backend service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gis-portal-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
      - backend/.env
    environment:
      - PYTHONUNBUFFERABLE=1
    networks:
      - gis-network
    depends_on:
      db:
        condition: service_started
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # Frontend service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gis-portal-frontend
    ports:
      - "3000:3000"
    env_file:
      - frontend/.env
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - gis-network
    depends_on:
      - backend

  # Database service (PostgreSQL with PostGIS)
  db:
    image: postgis/postgis:17-3.4
    container_name: gis-portal-db
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - gis-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  gis-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local